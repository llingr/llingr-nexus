name: Release build

# Trusted builder (SLSA Build L3 pattern): builds the release assets and
# signs the attestations. Runs only via workflow_call from release.yml.
# Holds signing permissions but NO contents:write; the caller's publish
# job is the inverse. Verify with:
#   gh attestation verify <asset> --repo llingr/llingr-nexus \
#     --signer-workflow llingr/llingr-nexus/.github/workflows/release-build.yml

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: build & attest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          # cyclonedx-gomod v1.10+ requires Go >= 1.25
          go-version: '1.26'
          cache: false

      - name: Source archive
        run: >
          git archive --format=tar.gz
          --prefix="llingr-nexus-${GITHUB_REF_NAME}/"
          -o "llingr-nexus_${GITHUB_REF_NAME}.tar.gz"
          "${GITHUB_REF_NAME}"

      - name: Generate CycloneDX SBOM (cyclonedx-gomod)
        run: >
          go run github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@v1.10.0
          mod -licenses -type library -json
          -output "llingr-nexus_${GITHUB_REF_NAME}.cdx.json"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SPDX SBOM (syft)
        run: >
          syft dir:.
          --exclude './.github/**'
          --source-name llingr-nexus
          --source-version "${GITHUB_REF_NAME}"
          --source-supplier "Llingr Software Ltd"
          -o "spdx-json=llingr-nexus_${GITHUB_REF_NAME}.spdx.json"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: llingr-nexus_${{ github.ref_name }}.tar.gz

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: llingr-nexus_${{ github.ref_name }}.tar.gz
          sbom-path: llingr-nexus_${{ github.ref_name }}.cdx.json

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: llingr-nexus_${{ github.ref_name }}.*
          if-no-files-found: error
          retention-days: 1
