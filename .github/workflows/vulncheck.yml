name: Vulncheck

on:
  # Called by the Pipeline orchestrator on push/PR; runs standalone on the
  # weekly cron so scans keep landing between commits.
  workflow_call:
  schedule:
    - cron: '45 5 * * 2'

permissions:
  contents: read

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # newest toolchain so the scan sees current stdlib security patches
          go-version: 'stable'
          check-latest: true
          cache: true
      # Pinned tool version; the vulnerability database is still fetched fresh
      # at scan time, so detection stays current.
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
      - run: govulncheck ./...
