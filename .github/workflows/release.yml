name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # create the release and upload assets
  id-token: write      # sigstore signing for attestations
  attestations: write

jobs:
  release:
    name: release (SBOM + attestations)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Source archive
        run: >
          git archive --format=tar.gz
          --prefix="llingr-nexus-${GITHUB_REF_NAME}/"
          -o "llingr-nexus_${GITHUB_REF_NAME}.tar.gz"
          "${GITHUB_REF_NAME}"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOMs (CycloneDX + SPDX)
        run: >
          syft dir:.
          --exclude './.github/**'
          --source-name llingr-nexus
          --source-version "${GITHUB_REF_NAME}"
          --source-supplier "Llingr Software Ltd"
          -o "cyclonedx-json=llingr-nexus_${GITHUB_REF_NAME}.cdx.json"
          -o "spdx-json=llingr-nexus_${GITHUB_REF_NAME}.spdx.json"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: llingr-nexus_${{ github.ref_name }}.tar.gz

      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-path: llingr-nexus_${{ github.ref_name }}.tar.gz
          sbom-path: llingr-nexus_${{ github.ref_name }}.cdx.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --verify-tag
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          "llingr-nexus_${GITHUB_REF_NAME}.tar.gz"
          "llingr-nexus_${GITHUB_REF_NAME}.cdx.json"
          "llingr-nexus_${GITHUB_REF_NAME}.spdx.json"
